name: Test Docker Installation

on:
  release:
    types:
      - created

jobs:
  test-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Docker and Docker Compose
      run: |
        echo "y" | make -C template/.dockyman install-docker
        echo "y" | make -C template/.dockyman install-docker-compose

    - name: Test Docker
      run: |
        docker --version
        docker-compose --version
