name: Dockyman CI

on:
  push:
    branches:
      - v3.x_pip  # Change this to your default branch name if different
  
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]  # Adjust Python versions if needed

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install Python dependencies
      run: |
        make install

    - name: Run tests
      run: |
        make test

    - name: Archive test results (optional)
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: .pytest_cache/
