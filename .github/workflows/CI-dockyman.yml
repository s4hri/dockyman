name: Build and Push Docker Image

on:
  release:
    types:
      - created

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract version from .env file
        id: extract-version
        run: |
          echo "VERSION=$(grep -oP '^DOCKYMAN_VER=\K.*' ./.env)" >> $GITHUB_ENV

      - name: Login to Docker registry
        run: echo $DOCKER_PASSWORD | docker login --username $DOCKER_USERNAME --password-stdin

      - name: Build and push Docker image
        env:
          PROJECT_VERSION: ${{ env.VERSION }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/dockyman
        run: |
          echo "Building Docker image..."
          bash build.sh
          echo "Pushing Docker image..."
          docker push $DOCKER_IMAGE_NAME:$PROJECT_VERSION
          docker tag $DOCKER_IMAGE_NAME:$PROJECT_VERSION $DOCKER_IMAGE_NAME:latest
          docker push $DOCKER_IMAGE_NAME:latest
