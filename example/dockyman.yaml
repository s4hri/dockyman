project:
  name: my_project
  dockyman_repo: https://github.com/s4hri/dockyman
  # dockyman_ref: v4.3.0  # Pin to a specific git tag or branch. Omit to use the
  #                        # installed dockyman version automatically. Set this
  #                        # when you need to lock a project to a version that
  #                        # differs from the one currently installed.

  # ── Variable files ────────────────────────────────────────────────────────
  # One or more YAML or .env files whose top-level keys become Jinja2 template
  # globals available anywhere in this file.  Files are merged in order; later
  # entries override earlier ones.
  #
  # Supported formats:
  #   .yaml / .yml  – top-level keys merged as template globals (nested dicts
  #                   accessible with dot notation: {{ all.hosts.worker.ansible_host }})
  #   .env          – KEY=VALUE pairs merged as flat globals: {{ MY_VAR }}
  #
  # The built-in `env` mapping is always available without a vars_file:
  #   {{ env.HOME }}, {{ env.USER }}, etc.
  vars_files:
    - ansible/inventory.yaml
    - .env

  # ── Global variables ──────────────────────────────────────────────────────
  # Jinja2 template strings resolved in order — each var can reference any
  # var defined above it, as well as globals from vars_files and {env.*}.
  # Use these to define shared values and avoid repetition across nodes.
  vars:
    manager_docker_host:  "unix:///var/run/docker.sock"
    manager_shell_prefix: "PUID=$(id -u) PGID=$(id -g)"

    worker_user: "{{ env.USER }}" # "all.hosts.worker.ansible_user" is not available here because vars_files are merged after vars, so we use env.USER as a fallback.
    worker_docker_host:  "ssh://{{ worker_user }}@{{ all.hosts.worker.ansible_host }}"
    worker_shell_prefix: "PUID=$(ssh {{ worker_user }}@{{ all.hosts.worker.ansible_host }} id -u) PGID=$(ssh {{ worker_user }}@{{ all.hosts.worker.ansible_host }} id -g)"

    run_args: "--remove-orphans"
    audio_volume_level: "75%"

  # ── Global profile defaults ───────────────────────────────────────────────
  # Profiles defined here apply to every node that does not explicitly override
  # them.  A node can override any of these by defining the same key locally.
  build_profiles: ["build"]
  run_profiles: ["production"]
  # pull_profiles and push_profiles are not set here, so they fall back to
  # run_profiles automatically.  Set to [] to pull/push all
  # services with no profile filter, or list specific profiles to override.
  # pull_profiles: []
  # push_profiles: []

  # ── Project-level playbooks ───────────────────────────────────────────────
  # Playbooks listed here are project-scoped: the target hosts are defined
  # inside each playbook's own 'hosts:' directive (resolved from the Ansible
  # inventory).  Dockyman does NOT add --limit for these entries.
  #
  # For node-scoped playbooks (where dockyman adds --limit automatically),
  # define them under nodes.<name>.playbooks instead.
  #
  # hook – when to run automatically (omit or set to 'setup' to run during `dockyman setup`):
  #   setup         – during `dockyman setup` (default when hook is omitted)
  #   before_build  – before any `docker compose build`
  #   before_run    – before any `docker compose up`
  #   after_run     – after  `docker compose up`  completes
  #   after_down    – after  `docker compose down` completes
  playbooks:
    - name: configure_audio
      file: ./ansible/playbooks/configure_audio.yaml
      hook: setup
      extra_vars:
        volume: {{ audio_volume_level }}

    - name: check_subshell_resolution
      file: ./ansible/playbooks/check_subshell_resolution.yaml
      hook: setup
      extra_vars:
        var_subshell_example: ${PWD##*/}
  # ── Logging ───────────────────────────────────────────────────────────────

  # Container logs: one file per service per node → <dir>/<node_id>/<service>.log
  # Omit or leave empty to stream container output to stdout.
  # Override at runtime with: dockyman run --log-output <dir>
  container_log_dir: ./logs/containers

  # Hardware/config logs: one file per node → <dir>/<node_id>.log
  # Omit or leave empty to print hardware info to stdout.
  config_log_dir: ./logs/config

  # ── Nodes ─────────────────────────────────────────────────────────────────
  # Each node maps to a Docker daemon (local socket or remote via SSH) and its
  # own set of Compose files.  Commands (build, run, down, …) are executed on
  # every node in definition order.
  nodes:

    # ── Local node ────────────────────────────────────────────────────────
    manager:

      # Base directory for Docker files, relative to this yaml file.
      docker_context: ./nodes/manager

      # One or more Compose files merged in order, relative to docker_context.
      compose_files:
        - compose.yaml

      # Docker daemon socket.  Use ssh://user@host for remote daemons.
      docker_host: {{ manager_docker_host }}

      # Env files passed to Compose with --env-file, relative to docker_context.
      env_files:
        - .env

      # ── Build settings ─────────────────────────────────────────────────
      # Shell expression prepended to `docker compose build`.
      build_shell_prefix: {{ manager_shell_prefix }}
      # build_profiles inherits global ["build"] — override here if needed.
      # Extra CLI args appended to `docker compose build`.
      # build_args: "--no-cache"

      # ── Run settings ───────────────────────────────────────────────
      # These settings are also used by `dockyman down` and `dockyman config`.
      # Shell expression prepended to `docker compose up/down/config`.
      run_shell_prefix: {{ manager_shell_prefix }}
      # run_profiles inherits global ["production"] — override here if needed.
      # Extra CLI args appended to `docker compose up`.
      run_args: "{{ run_args }}"
      # Extra CLI args appended to `docker compose down` (omit to use no extra args).
      # down_args: "--remove-orphans"

      # ── Pull settings ──────────────────────────────────────────────────
      # When omitted, pull uses run_shell_prefix and run_profiles as fallback.
      # Set pull_profiles: [] to pull all services with no profile filter.
      # pull_shell_prefix: {{ manager_shell_prefix }}
      # pull_profiles: []

      # ── Push settings ──────────────────────────────────────────────────
      # When omitted, push uses run_shell_prefix and run_profiles as fallback.
      # Set push_profiles: [] to push all services with no profile filter.
      # push_shell_prefix: {{ manager_shell_prefix }}
      # push_profiles: []

      # ── Down settings ──────────────────────────────────────────────────
      # When omitted, down uses run_shell_prefix and run_profiles as fallback.
      # Set down_profiles: [] to stop all services with no profile filter.
      # down_shell_prefix: {{ manager_shell_prefix }}
      # down_profiles: []

    # ── Remote node ───────────────────────────────────────────────────────
    # This node runs on a separate machine reached via SSH.
    # Ensure passwordless SSH access is configured before running dockyman.
    worker:
      docker_context: ./nodes/worker
      compose_files:
        - compose.yaml
      docker_host: {{ worker_docker_host }}
      env_files:
        - .env
      build_profiles: ["build"]
      # PUID/PGID are resolved on the remote host so file ownership is correct.
      build_shell_prefix: {{ worker_shell_prefix }}
      run_shell_prefix:   {{ worker_shell_prefix }}

      run_args: "{{ run_args }}"
      # build_profiles and run_profiles inherit global defaults.
      # pull and push fall back to run_shell_prefix / run_profiles when not set.
      # down also falls back to run_shell_prefix / run_profiles when not set.
      # Set pull_profiles: [] or push_profiles: [] or down_profiles: [] to target all services.
      # pull_shell_prefix: {{ worker_shell_prefix }}
      # pull_profiles: []
      # push_shell_prefix: {{ worker_shell_prefix }}
      # push_profiles: []
      # down_shell_prefix: {{ worker_shell_prefix }}
      # down_profiles: []
