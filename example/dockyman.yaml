project:
  name: my_project
  dockyman_repo: https://github.com/s4hri/dockyman
  dockyman_ref: v4.3.0

  # Path to the Ansible inventory, relative to this file.
  inventory: ansible/inventory.yaml

  # ── Global variables ──────────────────────────────────────────────────────
  # Flat key/value pairs available as {{ key }} in any node field across this
  # file.  Use these for values shared by multiple nodes.
  vars:
    manager_docker_host:  "unix:///var/run/docker.sock"
    manager_shell_prefix: "PUID=$(id -u) PGID=$(id -g)"
    worker_docker_host:  "ssh://{{ hosts.worker.ansible_user }}@{{ hosts.worker.ansible_host }}"
    worker_shell_prefix: "PUID=$(ssh {{ hosts.worker.ansible_user }}@{{ hosts.worker.ansible_host }} id -u) PGID=$(ssh {{ hosts.worker.ansible_user }}@{{ hosts.worker.ansible_host }} id -g)"
    run_args: "--remove-orphans"
    audio_volume_level: "75%"

  # ── Global playbooks ──────────────────────────────────────────────────────
  # Playbooks run at project level. Target hosts are defined inside each
  # playbook using its own 'hosts:' directive (resolved from inventory);
  # dockyman never adds --limit for these entries.
  #
  # Available hooks (omit 'hook' to run only via `dockyman ansible`):
  #   before_build  – runs before any `docker compose build`
  #   before_run    – runs before any `docker compose up`
  #   after_run     – runs after  `docker compose up`  completes
  #   after_down    – runs after  `docker compose down` completes
  playbooks:
    - name: configure_audio
      file: ./ansible/playbooks/configure_audio.yaml
      hook: before_run
      extra_vars:
        volume: {{ audio_volume_level }}

  # ── Logging configuration ──────────────────────────────────────────────
  
  # Container logs: one file per service per node → <container_log_dir>/<node_id>/<service>.log
  # Leave empty or omit to disable (container logs go to stdout).
  # Can be overridden at runtime with: dockyman run --log-output <dir>
  container_log_dir: ./logs/containers

  # Hardware/config logs: one file per node → <config_log_dir>/<node_id>.log
  # Leave empty or omit to disable (hardware info prints to stdout).
  config_log_dir: ./logs/config

  nodes:

    # ── Local node ────────────────────────────────────────────────────────
    manager:

      # Base directory for Docker files, relative to this yaml file.
      docker_context: ./nodes/manager

      # One or more Compose files to merge, relative to docker_context.
      compose_files:
        - compose.yaml

      # Docker daemon socket. Use ssh://user@host for remote nodes.
      docker_host: {{ manager_docker_host }}

      # One or more env files passed to Compose with --env-file, relative to docker_context.
      env_files:
        - .env

      # ── Build settings ─────────────────────────────────────────────────
      # Shell expression prepended to `docker compose build` (e.g. env vars).
      build_shell_prefix: {{ manager_shell_prefix }}
      # Compose profiles to activate during build.
      build_profiles: ["build"]
      # Extra CLI args appended to `docker compose build`.
      # build_args: "--no-cache"

      # ── Run settings (also used by `dockyman down` and `dockyman config`) ──
      # Shell expression prepended to `docker compose up/down/config`.
      run_shell_prefix: {{ manager_shell_prefix }}
      # Compose profiles to activate during run/down/config.
      run_profiles: ["production"]
      # Extra CLI args appended to `docker compose up/down`.
      run_args: "{{ run_args }}"

    # ── Remote node ─────────────────────────────────────────────
    worker:
      docker_context: ./nodes/worker
      compose_files:
        - compose.yaml
      docker_host: {{ worker_docker_host }}
      build_profiles: ["build"]
      env_files:
        - .env
      # Use ssh subcommands to resolve values on the remote host.
      build_shell_prefix: {{ worker_shell_prefix }}
      run_shell_prefix:   {{ worker_shell_prefix }}
      run_profiles: ["production"]
