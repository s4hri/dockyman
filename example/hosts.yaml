# ── Ansible inventory ─────────────────────────────────────────────────────────
#
# This file is read by BOTH Ansible and dockyman.
#
# Put here:
#   - Connection vars Ansible needs: ansible_host, ansible_connection, ansible_user
#
# Playbook vars that dockyman passes via extra_vars: belong in vars.yaml.
# Variables only used by dockyman (docker_host, shell_prefix, …) also belong in
# vars.yaml, which is invisible to Ansible.
# ──────────────────────────────────────────────────────────────────────────────

all:
  vars:
    ansible_python_interpreter: auto_silent
  hosts:
    manager:
      ansible_host:       127.0.0.1
      ansible_connection: local
    worker:
      ansible_host:       127.0.0.1
      ansible_connection: local # Use "ssh" for remote hosts (requires passwordless SSH setup).
      # ansible_user: myremoteuser # optional, defaults to OS user running dockyman
