services:

  dockyman:
    image: iitschri/dockyman:${DOCKYMAN_VER:?err}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/group:/etc/group:ro
      - ../:/shared

    entrypoint: dockyman --action ${ACTION:-noaction} --username ${USERNAME:?err} --uid ${USER_UID:?err} --gid ${USER_UID:?err} --groups ${USER_GROUPS:?err}
