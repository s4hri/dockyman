project:
  dockyman_version: 3.0

  context: ./ # Path to the project context, relative to the dockyman.yaml file

  build:
    base:
      compose_file: base/compose.yaml
      env_file: build.env

    local:
      compose_file: local/compose.yaml
      env_file: .env # Autogenerated by dockyman (DO NOT CHANGE THIS)

  runtime:
    compose_file: compose.yaml
    env_file: .env # Autogenerated by dockyman (DO NOT CHANGE THIS)
    manager_entrypoint: .dockyman/scripts/initHost.sh # Script to run on the manager before starting the containers

swarm:
  manager:
    id: manager-node
    host: 127.0.0.1
    user: ${USER}
    ssh_port: 22
    docker_daemon_address: unix:///var/run/docker.sock

  workers: []

    # - id: worker-node
    #   host: 192.168.1.1
    #   user: myuser
    #   ssh_port: 22
    #   docker_daemon_address: ssh://myuser@192.168.1.1

# The following environment variables are attached to the containers. Remeber to build the image with `dockyman build` to apply them.
environments_extra:
  - DOCKER_LOGS=false
