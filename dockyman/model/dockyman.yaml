project:
  dockyman_version: v3.0

  build:
    base:
      compose_file: ./base/compose.yaml
      env_file: ./build.env

    local:
      compose_file: ./local/compose.yaml
      env_file: ./.env # Autogenerated by dockyman (DO NOT CHANGE THIS)

  runtime:
    compose_file: ./compose.yaml
    env_file: ./.env # Autogenerated by dockyman (DO NOT CHANGE THIS)

swarm:
  manager:
    id: manager-node
    host: 127.0.0.1
    user: ${LOCALHOST_USER}
    ssh_port: 22
    docker_daemon_address: unix:///var/run/docker.sock

  workers:
    - id: worker-node
      host: 127.0.0.1
      user: ${LOCALHOST_USER}
      ssh_port: 22
      docker_daemon_address: unix:///var/run/docker.sock

environments_extra:
  - DOCKER_LOGS=false