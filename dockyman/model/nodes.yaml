version: "1.0"

swarm:

  manager:
    id: manager-node # id of the manager node
    host: 192.168.1.14 # ip address of the manager node
    user: ${LOCALHOST_USER} # user of the manager node
    docker_daemon_address: unix:///var/run/docker.sock
    ssh_port: 22
    role: manager
    label: label-1

  workers:
    - id: worker-node
      host: 192.168.1.11
      user: dave
      docker_daemon_address: ssh://dave@192.168.1.11
      ssh_port: 22
      role: worker
      label: label-1
