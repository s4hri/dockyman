services:

  project.local:
    image: ${LOCAL_IMAGE_NAME:?err}

    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_SRC: ${BASE_IMAGE_NAME:?err}
        USERNAME: ${LOCAL_IMAGE_USERNAME:?err}
        USER_UID: ${USER_UID:?err}
        USER_GID: ${USER_GID:?err}
        USER_GROUPS: ${LOCAL_IMAGE_GROUPS:?err}
        GROUP_IDS: ${GROUP_IDS:?err}
        XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:?err}

    labels:
      dockyman.node: manager-node

    profiles:
      - base

