project:
  name: my_project
  dockyman_repo: https://github.com/s4hri/dockyman
  # dockyman_ref: v4.3.0  # Pin to a specific git tag or branch. Omit to use the
  #                        # installed dockyman version automatically. Set this
  #                        # when you need to lock a project to a version that
  #                        # differs from the one currently installed.

  # ── Global variables ──────────────────────────────────────────────────────
  # Jinja2 template strings resolved in order — each var can reference any
  # var defined above it, as well as the built-in {env.*} mapping.
  # Use these to define shared values and avoid repetition across nodes.
  vars:
    current_user: "{{ env.USER }}"
    docker_host: "unix:///var/run/docker.sock"
    shell_prefix: "PUID=$(id -u) PGID=$(id -g)"
    run_args: "--remove-orphans"

  # ── Global profile defaults ────────────────────────────────────────────────
  # Profiles defined here apply to every node that does not explicitly override
  # them.  A node can override any of these by defining the same key locally.
  build_profiles: ["build"]
  run_profiles: ["production"]
  # pull_profiles, push_profiles, and down_profiles are not set here, so they
  # fall back to run_profiles automatically.  Set to [] to
  # target all services with no profile filter, or list specific profiles.
  # pull_profiles: []
  # push_profiles: []
  # down_profiles: []

  # ── Logging ───────────────────────────────────────────────────────────────

  # Container logs: one file per service per node → <dir>/<node_id>/<service>.log
  # Omit or leave empty to stream container output to stdout.
  # Override at runtime with: dockyman run --log-output <dir>
  container_log_dir: ./logs/containers

  # Hardware/config logs: one file per node → <dir>/<node_id>.log
  # Omit or leave empty to print hardware info to stdout.
  config_log_dir: ./logs/config

  # ── Nodes ─────────────────────────────────────────────────────────────────
  # Each node maps to a Docker daemon (local socket or remote via SSH) and its
  # own set of Compose files.  Commands (build, run, down, …) are executed on
  # every node in definition order.
  nodes:

    # ── Local node ────────────────────────────────────────────────────────
    app:

      # Base directory for Docker files, relative to this yaml file.
      docker_context: ./nodes/app

      # One or more Compose files merged in order, relative to docker_context.
      compose_files:
        - compose.yaml

      # Docker daemon socket.
      docker_host: {{ docker_host }}

      # Env files passed to Compose with --env-file, relative to docker_context.
      env_files:
        - .env

      # ── Build settings ─────────────────────────────────────────────────
      # Shell expression prepended to `docker compose build`.
      build_shell_prefix: {{ shell_prefix }}
      # build_profiles inherits global ["build"] — override here if needed.
      # Extra CLI args appended to `docker compose build`.
      # build_args: "--no-cache"

      # ── Run settings ───────────────────────────────────────────────────
      # Shell expression prepended to `docker compose up/down/config`.
      run_shell_prefix: {{ shell_prefix }}
      # run_profiles inherits global ["production"] — override here if needed.
      # Extra CLI args appended to `docker compose up`.
      run_args: "{{ run_args }}"
      # Extra CLI args appended to `docker compose down` (omit to use no extra args).
      # down_args: "--remove-orphans"
